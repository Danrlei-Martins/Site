<!DOCTYPE html>
 
<html lang="pt-br">
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="styles/style.css"/>
  <title>Formulario</title>
</head>
<body>
  <main>
  <h1>Formulário de candidatura</h1>
  <form id="form" name="form">
    <label for="nome">Nome completo</label>
    <input type="text" id="nome" name="NOME" required><br>
    
    <label for="email">E-mail</label>
    <input type="email" id="email" name="EMAIL" required><br>
    
    <label for="idade">Idade</label>
    <input type="number" id="idade" name="IDADE" min="18" required>
    <br><br>
  
    <label for="materias">Para qual matéria está se candidatando?</label><br>
    
  <select id="materias" name="ASSUNTO">
  <option value="matematica">Matemática</option>
  <option value="portugues">Português</option>
  <option value="biologia">Biologia</option>
  <option value="ciencias">Ciências</option>
  <option value="historia">História</option>
  <option value="geografia">Geografia</option>
  <option value="artes">Artes</option>
</select>
<br><br>
  
<fieldset>
  <legend>Turnos disponíveis</legend>
  
  <input type="checkbox" id="manha" name="TURNOS DISPONÍVEIS" value="manha">
  <label for="manha">Manhã</label>
  
  <input type="checkbox" id="tarde" name="TURNOS DISPONÍVEIS" value="tarde">
  <label for="tarde">Tarde</label>
  
  <input type="checkbox" id="noite" name="TURNOS DISPONÍVEIS" value="noite">
  <label for="noite">Noite</label>
</fieldset>
<br>
  
  <label for="escolaridade">Qual sua escolaridade?</label><br>
<select id="escolaridade" name="ESCOLARIDADE">
  <option value="ensinoSuperiorCompleto">Ensino superior completo</option>
  <option value="cursandoMestrado">Cursando mestrado</option>
  <option value="mestradoCompleto">Mestrado completo</option>
  <option value="cursandoDoutorado">Cursando doutorado</option>
  <option value="doutoradoCompleto">Doutorado completo</option>
</select><br>
  
  <label for="descricao">Descrição</label>
  <textarea id="descricao" name="DESCRIÇÃO" rows="4"></textarea><br>
  <button type="submit">Enviar</button>
  </form>
  </main>
  </body>
</html>
