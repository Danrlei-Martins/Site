<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>DMilech</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Danrlei</h1>

      <nav>
        <!----Seção de navegaçã-->
        <ul>
          <li><a href="#sobre">Sobre mim</a></li>
          <li><a href="#projetos">Projetos</a></li>
          <li><a href="#contato">Contato</a></li>
          <li><a href="https://google.com.br" target="_blank">Google</a></li>
        </ul>
        <!--Lista não ordenad-->
      </nav>
    </header>
    <section id="sobre">
      <h2>Sobre mim</h2>

      <img
        src="http://picsum.photos/200/300"
        alt="imagem de foto do perfil"
        title="Imagem de perfil"
      />

      <article>
        <p>ola, meu nome e danrlei.</p>
      </article>

      <aside>
        <h3>Habilidade</h3>
        <ul>
          <li>Java</li>
          <li>html</li>
        </ul>
      </aside>
    </section>

    <section id="projetos">
      <h2>Projetos</h2>

      <article>
        <h3>Portifolio</h3>
        <p>Primeiro projeto em front-end</p>
      </article>
    </section>

    <footer>
      <p>Direitos reservados.</p>

      <section id="contato">
        <h2>Contato</h2>

        <p>Algum projeto? entre em contato.</p>

        <form action="">
          <label for="nome">Nome: </label>
          <input type="text" id="nome" name="nome" required /> <br />

          <label for="email">E-mail: </label>
          <input type="email" id="email" name="email" required /> <br />

          <label for="telefone">Telefone: </label>
          <input type="tel" id="telefone" name="telefone" required /> <br />

          <label for="assunto">Assunto: </label>
          <select name="assunto" id="assunto">
            <option value="orcamento">Orçamento</option>
            <option value="duvida">Dúvida</option>
            <option value="outro">Outro</option>
            0
          </select>
          <br />

          <label for="mensagem">Mensagem: </label>
          <textarea name="mensagem" id="mensagem" cols="20" rows="10"></textarea
          ><br />

          <input type="checkbox" id="inscricao" name="inscricao" />
          <label for="inscricao"
            >Deseja receber minhas atualizações? Fique por dentro.</label
          >

          <br />

          <input type="submit" value="Enviar mensagem" />
        </form>
      </section>
    </footer>
  </body>
</html>
